name: Android CI - Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties','**/gradle/*.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (installs Gradle on the runner)
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.10.2'

      - name: Install Android SDK command-line tools and required components
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}
        run: |
          set -e
          mkdir -p "${ANDROID_SDK_ROOT}"
          cd "${ANDROID_SDK_ROOT}"
          # Descargar command-line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O commandlinetools.zip
          mkdir -p cmdline-tools
          unzip -q commandlinetools.zip -d cmdline-tools
          if [ -d "cmdline-tools/cmdline-tools" ]; then
            mv cmdline-tools/cmdline-tools cmdline-tools/latest
          else
            mv cmdline-tools/* cmdline-tools/latest
          fi
          rm -f commandlinetools.zip
          # Prepend Java + SDK tools al PATH local del script, preservando PATH del sistema
          export PATH="${JAVA_HOME}:${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:$PATH"
          # Instalar platform-tools, plataforma y build-tools (ajusta versiones si es necesario)
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" "platform-tools" "platforms;android-33" "build-tools;33.0.0"
          # Aceptar licencias (ignorar posible "Broken pipe" que no afecta la instalación)
          printf 'y\n' | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
        shell: bash


      - name: Build debug APK with Gradle
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          # Aseguramos PATH para gradle también
          export PATH="${JAVA_HOME}:${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:$PATH"
          gradle clean assembleDebug --no-daemon --stacktrace
        shell: bash

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
