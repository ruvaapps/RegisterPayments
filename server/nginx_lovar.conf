server {
    listen 80;
    server_name lovar.com.ar www.lovar.com.ar;
    root /var/www/lovar.com.ar/html;
    index app.php index.php index.html;

    # Redirect HTTP -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name lovar.com.ar www.lovar.com.ar;
    root /var/www/lovar.com.ar/html;
    index app.php index.php index.html;

    # Ajusta estos certificados a los reales (Let's Encrypt por ejemplo)
    ssl_certificate /etc/letsencrypt/live/lovar.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lovar.com.ar/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # FastCGI / PHP-FPM
    location / {
        try_files $uri $uri/ /app.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Ajusta el socket o puerto según tu PHP-FPM
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    }

    # Opcional: pasar variables de entorno MySQL al proceso PHP (si no usas .env)
    fastcgi_param MYSQL_HOST     "127.0.0.1";
    fastcgi_param MYSQL_PORT     "3306";
    fastcgi_param MYSQL_DATABASE "registerpayments";
    fastcgi_param MYSQL_USER     "dbuser";
    fastcgi_param MYSQL_PASSWORD "dbpass";
}

